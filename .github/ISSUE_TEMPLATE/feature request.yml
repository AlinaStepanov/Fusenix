name: Feature request
description: Suggest a new connector, AI provider, or other improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: What kind of feature is this?
      options:
        - New connector (data source)
        - New AI provider
        - Timeline / UI improvement
        - Config Audit improvement
        - API / export
        - Developer experience (setup, docs, CI)
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where this would help. What are you trying to do that Fusenix doesn't support yet?
      placeholder: "During incidents I also check Sentry for error spikes, but I have to open it in a separate tab. It would help to see Sentry events inline in the timeline."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as specific or as rough as you like.
      placeholder: "A Sentry connector that pulls issue alerts and release events via the Sentry API."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other approaches you thought about.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to implement this and open a PR
        - label: I can help test it but won't implement it
