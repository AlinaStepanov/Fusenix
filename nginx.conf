server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Block the page from being embedded in frames (clickjacking protection)
    add_header X-Frame-Options "DENY" always;
    # Control referrer information sent with requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Restrict access to browser features
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Content Security Policy:
    #   - default-src 'self'       : all resource types default to same-origin
    #   - script-src 'self'        : only load scripts from our own origin
    #   - style-src 'self' 'unsafe-inline' : Vite CSS-in-JS needs inline styles
    #   - img-src 'self' data:     : allow inline data: URIs for small icons
    #   - connect-src 'self'       : API calls are relative, same origin
    #   - font-src 'self'          : fonts from same origin only
    #   - object-src 'none'        : block Flash, plugins, etc.
    #   - frame-ancestors 'none'   : double-lock against framing (alongside X-Frame-Options)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

    # ── Request size limit ─────────────────────────────────────────────────────
    # Protects the /analyze endpoint from oversized payloads (500 events * ~500 bytes ≈ 250 KB; 1 MB is generous)
    client_max_body_size 1m;

    # ── Gzip for faster page loads ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # ── React SPA — all unknown paths fall back to index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy — routes to backend ─────────────────────────────────────────
    location ~ ^/(timeline|analyze|sources|health|audit) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Allow long-running Claude analysis requests (up to 90s)
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
    }

    # ── Static asset caching ───────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Security headers must be repeated inside nested location blocks
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }
}
