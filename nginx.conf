server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip for faster page loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # React SPA — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FIX: proxy the actual API routes (no /api/ prefix — must match what api.js calls)
    location ~ ^/(timeline|analyze|sources|health) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Allow long-running Claude analysis requests (up to 90s)
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
